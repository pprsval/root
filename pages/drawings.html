<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <title>Drawings – Peres Valentin</title>

  <link rel="stylesheet" href="./../css/pages.css">

  <style>
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .gallery figure {
      margin: 0;
      text-align: center;
    }

    .gallery img {
      width: 100%;
      height: auto;
      border-radius: 6px;
      object-fit: cover;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .gallery img:hover {
      transform: scale(1.03);
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .pdf-thumb {
      background: #fafafa;
      border: 2px dashed #ccc;
      border-radius: 6px;
      padding: 30px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .pdf-thumb:hover {
      background: #f0f0f0;
      transform: scale(1.03);
    }

    figcaption {
      margin-top: 6px;
      font-size: 0.9rem;
      color: #555;
      font-family: "Instrument Serif", serif;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
    }
  </style>
</head>

<body>

<header>
  <h1><a href="../../index.html">&#8678;</a></h1>
</header>

<div class="gallery"
     data-source="../data/drawings.json"
     data-folder="../assets/drawings/">
</div>
<script src="../js/gallery-engine.js"></script>

</body>
</html>

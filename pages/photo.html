<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <title>Photo – Peres Valentin</title>

  <link rel="stylesheet" href="./../css/pages.css">

  <style>
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
      padding: 20px;
    }

    .gallery figure {
      margin: 0;
    }

    .gallery img {
      width: 100%;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .gallery img:hover {
      transform: scale(1.02);
      opacity: 0.95;
    }

    figcaption {
      margin-top: 6px;
      font-size: 0.85rem;
      color: #666;
      text-align: center;
      font-family: "Instrument Serif", serif;
    }
  </style>
</head>

<body>

<header>
  <h1><a href="../../index.html">&#8678;</a></h1>
</header>

<div class="gallery"
     data-source="../data/photo.json"
     data-folder="../assets/photo/">
</div>
<script src="../js/gallery-engine.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./../css/pages.css">

  <title>Writings</title>

  <style>

    /* =========================
       GRID LAYOUT
    ========================= */

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    figure {
      margin: 0;
      text-align: center;
    }

    /* =========================
       SAFE IMAGE RULES
    ========================= */

    .gallery img {
      width: 100%;
      height: auto;
      display: block;

      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s ease;

      object-fit: cover;
    }

    .gallery img:hover {
      transform: scale(1.03);
    }

    /* =========================
       PDF / WRITING THUMBNAIL
    ========================= */

    .pdf-thumb {
      aspect-ratio: 3 / 4;

      display: flex;
      justify-content: center;
      align-items: center;

      border: 2px dashed #ccc;
      border-radius: 6px;

      overflow: hidden;
      background: #fafafa;

      cursor: pointer;
      padding: 0;
    }

    .pdf-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .pdf-thumb div {
      font-size: 0.9rem;
      text-align: center;
    }

    /* =========================
       CAPTION
    ========================= */

    figcaption {
      font-size: 0.9rem;
      margin-top: 6px;
    }

    /* =========================
       LIGHTBOX SAFE MODE
    ========================= */

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);

      display: none;
      justify-content: center;
      align-items: center;

      z-index: 9999;
      overflow: hidden;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;

      width: auto;
      height: auto;

      object-fit: contain;
      border-radius: 6px;
      display: block;
    }

  </style>
</head>

<body>

<header>
  <a href="../../index.html">← back</a>
</header>

<div class="gallery"
     data-source="../data/writings.json"
     data-folder="../assets/writings/"></div>

<script src="../js/gallery-engine.js"></script>

</body>
</html>
